<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍연 마스터 — 구궁도 결과</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .meta-tag {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .meta-tag span { color: var(--gold); }

    .gung-detail {
      display: none;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 16px;
    }
    .gung-detail.active { display: block; }
    .gung-detail-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .gung-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-muted);
    }
    .gung-detail-row:last-child { border-bottom: none; }
    .gung-detail-row strong { color: var(--text-main); }

    /* summary 스타일은 style.css로 이관 */

    /* ── 세궁 해설 블록 ── */
    .segung-summary {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: rgba(180,140,80,0.05);
      border: 1px solid rgba(180,140,80,0.2);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 20px;
    }
    .segung-summary-left {
      text-align: center;
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      padding: 12px 18px;
      flex-shrink: 0;
    }
    .segung-num {
      font-family: 'Noto Serif KR', serif;
      font-size: 30px;
      color: var(--gold);
      line-height: 1;
    }
    .segung-gung-name {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      white-space: nowrap;
    }
    .segung-summary-right {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .segung-meta {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .segung-desc {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.75;
    }
    .segung-relation {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 7px 11px;
      background: rgba(255,255,255,0.025);
      border-left: 2px solid rgba(180,140,80,0.35);
      border-radius: 0 4px 4px 0;
    }
    .segung-relation strong { color: var(--gold); font-weight: 600; }

    /* ── 구궁 셀 추가 요소 ── */
    .gung-cell .gung-hanja {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      color: rgba(200,169,110,0.28);
      position: absolute;
      top: 7px;
      left: 8px;
      line-height: 1;
    }
    .gung-cell .gung-keyword {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      line-height: 1.35;
      margin-top: 2px;
      opacity: 0.85;
      word-break: keep-all;
    }

    /* ── 상세 패널 내부 ── */
    .detail-gung-life {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.8;
      padding: 10px 12px;
      background: rgba(180,140,80,0.05);
      border-left: 2px solid rgba(180,140,80,0.4);
      border-radius: 0 4px 4px 0;
    }
    .detail-relation-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.75;
    }

    /* ── 동처 하이라이트 ── */
    .gung-cell.is-dongcheo {
      border-color: rgba(220, 180, 60, 0.8) !important;
      box-shadow: 0 0 14px rgba(220, 180, 60, 0.25), inset 0 0 8px rgba(220,180,60,0.06);
      animation: dongcheo-pulse 2s ease-in-out infinite;
    }
    @keyframes dongcheo-pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(220,180,60,0.2); }
      50%       { box-shadow: 0 0 22px rgba(220,180,60,0.45); }
    }
    .dongcheo-badge {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(220,180,60,0.18);
      border: 1px solid rgba(220,180,60,0.5);
      color: #ddb840;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }
    .dongcheo-summary {
      background: rgba(220,180,60,0.06);
      border: 1px solid rgba(220,180,60,0.25);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .dongcheo-summary-title {
      font-size: 13px;
      color: #ddb840;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    /* ── 신살 배지 ── */
    .sinsal-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(180, 50, 30, 0.2);
      border: 1px solid rgba(200, 60, 40, 0.4);
      color: #e07060;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .sinsal-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .sinsal-detail-block {
      background: rgba(180,50,30,0.07);
      border-left: 2px solid rgba(200,60,40,0.4);
      border-radius: 0 4px 4px 0;
      padding: 10px 12px;
      font-size: 12px;
      color: #c87060;
      line-height: 1.75;
      margin-top: 6px;
    }
    .sinsal-detail-block strong { color: #e07060; display: block; margin-bottom: 3px; }

    /* ── 방위 토글 버튼 ── */
    .map-toggle-btn {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      padding: 5px 12px;
      transition: all 0.2s;
    }
    .map-toggle-btn:hover, .map-toggle-btn.active {
      border-color: var(--border-glow);
      color: var(--gold);
      background: rgba(180, 140, 80, 0.08);
    }
  </style>
</head>
<body>

  <script src="js/header.js"></script>

  <main class="container">

    <!-- 메타 정보 -->
    <div class="meta-bar" id="metaBar">
      <div class="meta-tag">절기: <span id="jeolgiName">-</span></div>
      <div class="meta-tag">구분: <span id="dunType">-</span></div>
      <div class="meta-tag">국수: <span id="baseGuksu">-</span>국</div>
      <div class="meta-tag">지반수: <span id="jibansu">-</span></div>
      <div class="meta-tag">천반수: <span id="cheonbansu">-</span></div>
    </div>

    <!-- 경고 메시지 -->
    <div id="warnBox" style="display:none; background:rgba(180,140,80,0.08);
      border:1px solid var(--border-glow); border-radius:8px;
      padding:12px 16px; margin-bottom:16px; font-size:13px; color:var(--gold);">
    </div>

    <!-- 구궁도 -->
    <div class="card">
      <div class="card-title">구궁도 (세궁: <span id="segungLabel" class="text-gold">-</span>)</div>

      <!-- 방위 배열 토글 -->
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap;">
        <span style="font-size:11px; color:var(--text-muted);">방위 배열:</span>
        <button class="map-toggle-btn active" id="btnTraditional" onclick="setMapMode('traditional')">🧭 전통 역술 (남↑)</button>
        <button class="map-toggle-btn" id="btnModern" onclick="setMapMode('modern')">🗺️ 현대 지도 (북↑)</button>
        <span id="mapModeDesc" style="font-size:11px; color:var(--text-dim); margin-left:4px;">황제가 남쪽을 바라보는 전통 방식</span>
      </div>

      <!-- 세궁 해설 -->
      <div class="segung-summary" id="segungSummary">
        <div class="segung-summary-left">
          <div class="segung-num" id="ssNum">-</div>
          <div class="segung-gung-name" id="ssGungName">-</div>
        </div>
        <div class="segung-summary-right">
          <div class="segung-meta" id="ssMeta">-</div>
          <div class="segung-desc" id="ssDesc">-</div>
          <div class="segung-relation" id="ssRelation"></div>
        </div>
      </div>

      <!-- 동처 분석 요약 -->
      <div class="dongcheo-summary" id="dongcheoSummary" style="display:none;">
        <div class="dongcheo-summary-title">⚡ 동처(動處) — 지금 가장 활성화된 방위</div>
        <div id="dongcheoText"></div>
      </div>

      <!-- 나침반 라벨 -->
      <div style="text-align:center; font-size:11px; color:var(--text-dim); margin-bottom:4px; letter-spacing:0.05em;">
        <span id="compassTop">南 ↑</span>
      </div>
      <div style="display:flex; align-items:center; gap:4px;">
        <span style="font-size:11px; color:var(--text-dim); writing-mode:vertical-rl; letter-spacing:0.05em;">東</span>
        <div class="gugung-grid" id="gugungGrid" style="flex:1;"></div>
        <span style="font-size:11px; color:var(--text-dim); writing-mode:vertical-rl; letter-spacing:0.05em;">西</span>
      </div>
      <div style="text-align:center; font-size:11px; color:var(--text-dim); margin-top:4px; letter-spacing:0.05em;">
        <span id="compassBottom">↓ 北</span>
      </div>

      <!-- 클릭 시 상세 표시 -->
      <div class="gung-detail" id="gungDetail">
        <div class="gung-detail-title" id="detailTitle">—</div>
        <div class="gung-detail-row">
          <span>방위</span><strong id="detailDir">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>오행</span><strong id="detailOhaeng">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>지반수</span><strong id="detailJiban">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>천반수</span><strong id="detailCheon">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>관계</span><strong id="detailRelation">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>운세 점수</span><strong id="detailScore">-</strong>
        </div>
        <div class="gung-detail-row" id="detailPalmunRow">
          <span>팔문</span>
          <span id="detailPalmun" style="text-align:right; max-width:70%; font-size:13px;">-</span>
        </div>
        <!-- ① 궁 고유 해설 -->
        <div class="detail-gung-life mt-8" id="detailDesc">-</div>
        <!-- ② 천반·지반 관계 해설 -->
        <div class="detail-relation-desc mt-8" id="detailExtra">-</div>
        <!-- ③ 부연설명 -->
        <div class="summary-item-detail mt-8" id="detailSub" style="display:none"></div>
      </div>
    </div>

    <!-- 길흉 요약 -->
    <div class="card">
      <div class="card-title">길흉 요약</div>
      <ul class="summary-list" id="summaryList"></ul>
    </div>

    <!-- 이동 버튼 -->
    <div style="display: flex; gap: 10px; margin-bottom: 32px;">
      <a href="premium.html" class="btn btn-secondary" style="text-decoration: none;">
        🔒 심층 풀이 보기
      </a>
      <a href="prompt.html" class="btn btn-secondary" style="text-decoration: none;">
        ✦ AI 프롬프트 생성
      </a>
    </div>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/data-jeolgi.js"></script>
  <script src="js/data-ganji.js"></script>
  <script src="js/data-gugung.js"></script>
  <script src="js/data-yukhin.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/firebase.js"></script>

  <script>
    // 저장된 결과 불러오기
    const result = JSON.parse(sessionStorage.getItem("hongyeon_result") || "null");
    let palmunBoard   = {};
    let board         = {};
    let analysis      = {};
    let dongcheoNums  = new Set();
    let combinedMap   = {};       // showDetail에서도 참조
    let currentMapMode = 'traditional';
    const GRID_TRADITIONAL = [4, 9, 2, 3, 5, 7, 8, 1, 6];
    const GRID_MODERN      = [8, 1, 6, 3, 5, 7, 4, 9, 2];

    // 방위 토글 — HTML onclick에서 직접 호출하므로 전역 함수로 선언
    function setMapMode(mode) {
      currentMapMode = mode;
      document.getElementById('btnTraditional').classList.toggle('active', mode === 'traditional');
      document.getElementById('btnModern').classList.toggle('active', mode === 'modern');
      document.getElementById('mapModeDesc').textContent = mode === 'traditional'
        ? '황제가 남쪽을 바라보는 전통 방식'
        : '우리가 학교에서 배운 현대 지도 방식';
      renderGrid();
    }

    // ── 전역 유틸 함수 ── (renderResult 밖에 선언 → 어디서든 호출 가능)

    // 구궁도 그리드 렌더링
    function renderGrid() {
      const gridOrder = currentMapMode === 'traditional' ? GRID_TRADITIONAL : GRID_MODERN;
      const grid = document.getElementById("gugungGrid");
      if (!grid) return;
      grid.innerHTML = "";

      document.getElementById('compassTop').textContent    = currentMapMode === 'traditional' ? '南 ↑' : '北 ↑';
      document.getElementById('compassBottom').textContent = currentMapMode === 'traditional' ? '↓ 北' : '↓ 南';

      gridOrder.forEach(gungNum => {
        const g = board[gungNum];
        if (!g) return;

        const rel        = g.relation;
        const isSegung   = g.isSegung || gungNum === analysis.segungIndex;
        const isDongcheo = dongcheoNums.has(gungNum);
        const scoreClass = rel.score >= 80 ? "high" : rel.score >= 40 ? "mid" : "low";

        const cell = document.createElement("div");
        cell.className = "gung-cell"
          + (isSegung   ? " is-segung"   : "")
          + (isDongcheo ? " is-dongcheo" : "");
        cell.dataset.gungNum = gungNum;

        const pmKey  = palmunBoard[gungNum] || "";
        const pmInfo = pmKey ? (PALMUN[pmKey] || { label: pmKey, score: 50 }) : null;
        const pmClass = pmInfo
          ? (pmInfo.score >= 80 ? "palmun-gil" : pmInfo.score >= 50 ? "palmun-mid" : "palmun-흉")
          : "";

        cell.innerHTML = `
          <span class="score-badge badge-${rel.badge}">${rel.badge}</span>
          <span class="gung-hanja">${g.gungInfo.hanja}</span>
          <span class="gung-name">${g.gungInfo.direction}</span>
          <span class="gung-num">${g.jibansu}</span>
          <span class="gung-cheonban">天 ${g.cheonbansu}</span>
          <span class="gung-keyword">${g.gungInfo.desc}</span>
          ${pmInfo ? `<span class="palmun-badge ${pmClass}">${pmInfo.label.replace(/\(.*\)/,"")}</span>` : ""}
          ${(g.sinsal && g.sinsal.length > 0)
            ? `<div class="sinsal-list">${g.sinsal.map(s => `<span class="sinsal-badge">${s.symbol || "⚡"}${s.label.replace(/\(.*\)/,"")}</span>`).join("")}</div>`
            : ""}
          ${isDongcheo ? `<span class="dongcheo-badge">⚡동처</span>` : ""}
          <div class="score-bar-wrap" style="width:100%; margin-top:4px;">
            <div class="score-bar ${scoreClass}" style="width:${rel.score}%"></div>
          </div>
        `;

        cell.addEventListener("click", () => showDetail(g, isSegung));
        grid.appendChild(cell);
      });
    }

    // 점수 → 배지
    function combinedBadge(score) {
      if (score >= 80) return "대길";
      if (score >= 60) return "길";
      if (score >= 40) return "중";
      if (score >= 25) return "보통";
      if (score >= 10) return "흉";
      return "대흉";
    }

    // 점수 구간별 종합 해석 멘트
    function combinedComment(score, gungName) {
      if (score >= 80) return `${gungName}은 현재 매우 강한 길기가 작용합니다. 이 방위를 적극 활용하세요.`;
      if (score >= 60) return `${gungName}은 길한 기운이 흐릅니다. 중요한 일을 이 방향에서 진행하면 유리합니다.`;
      if (score >= 40) return `${gungName}은 길흉이 혼재합니다. 신중하게 판단하고 움직이세요.`;
      if (score >= 25) return `${gungName}은 다소 불안정한 흐름입니다. 큰 결정은 보류하는 것이 좋습니다.`;
      if (score >= 10) return `${gungName}은 흉한 기운이 작용합니다. 이 방위의 이동·계약은 주의가 필요합니다.`;
      return `${gungName}은 매우 강한 흉기가 집중되어 있습니다. 이동·계약·투자를 피하고 현상 유지에 집중하세요.`;
    }

    if (!result) {
      alert("입력 데이터가 없습니다. 처음부터 시작해주세요.");
      window.location.href = "index.html";
    } else {
      renderResult(result);
    }

    function renderResult(r) {
      const { meta } = r;
      board    = r.board;
      analysis = r.analysis;

      // 메타 정보
      document.getElementById("jeolgiName").textContent  = meta.jeolgiName;
      document.getElementById("dunType").textContent     = meta.type;
      document.getElementById("baseGuksu").textContent   = meta.baseGuksu;
      document.getElementById("jibansu").textContent     = analysis.jibanHong;
      document.getElementById("cheonbansu").textContent  = analysis.cheonbanHong;
      // 경고 표시
      if (meta.warning) {
        const wb = document.getElementById("warnBox");
        wb.textContent = "⚠️ " + meta.warning;
        wb.style.display = "block";
      }

      document.getElementById("segungLabel").textContent =
        `${analysis.segungIndex}번 ${analysis.segungName}` +
        (analysis.dayGanOhaeng ? ` (일간 ${analysis.dayGanOhaeng})` : "");

      // ── 세궁 해설 렌더링 ──────────────────────────
      const segung = board[analysis.segungIndex];
      if (segung) {
        const sg = segung.gungInfo;
        const sr = segung.relation;

        document.getElementById("ssNum").textContent      = analysis.segungIndex;
        document.getElementById("ssGungName").textContent = sg.name;
        document.getElementById("ssMeta").textContent     =
          `${sg.direction} · ${sg.ohaeng} · ${sg.desc}`;

        // 세궁 도출 근거 설명
        const ganDesc = analysis.dayGanOhaeng
          ? `일간 오행(${analysis.dayGanOhaeng})을 기준으로 ` : "";
        document.getElementById("ssDesc").textContent =
          `${ganDesc}${meta.baseGuksu}국 ${meta.type} 포국에서 세궁은 ` +
          `${sg.name}(${sg.direction})입니다. ` +
          `이 방이 현재 나의 중심 자리로, 지반수 ${segung.jibansu}에 ` +
          `천반수 ${segung.cheonbansu}이 올라앉은 구조입니다. ` +
          `${sg.desc}의 기운이 주도하는 시기로 ${sr.summary}.`;

        // 관계 요약
        document.getElementById("ssRelation").innerHTML =
          `<strong>${sr.label}</strong> · ${sr.score}점 &nbsp;—&nbsp; ${sr.desc}` +
          (sr.detail ? `<br><span style="opacity:.8">${sr.detail}</span>` : "");
      }

      // 팔문 배속
      palmunBoard = (typeof buildPalmunBoard === "function")
        ? buildPalmunBoard(analysis.segungIndex)
        : {};

      // ── 동처(動處) 분석 ──────────────────────────
      // 각 궁의 활성도 점수 계산
      function calcDongcheoScore(g) {
        let score = 0;
        // 천극지 — 에너지 충돌 최강
        if (g.relation.label.includes("천극지")) score += 40;
        else if (g.relation.label.includes("지극천")) score += 25;
        else if (g.relation.label.includes("천생지")) score += 20;
        else if (g.relation.label.includes("지생천")) score += 15;
        // 팔문 극단값
        const pmScore = g.palmun?.score ?? 50;
        if (pmScore <= 5)  score += 35;  // 절명
        else if (pmScore <= 15) score += 28; // 절체
        else if (pmScore >= 95) score += 25; // 생기
        // 신살 발동
        score += (g.sinsal || []).length * 20;
        // 세궁 제외
        if (g.isSegung) score = 0;
        return score;
      }

      const dongcheoScores = Object.values(board)
        .map(g => ({ g, score: calcDongcheoScore(g) }))
        .filter(d => d.score > 0)
        .sort((a, b) => b.score - a.score);

      const topDongcheo = dongcheoScores.slice(0, 2); // 상위 2개
      dongcheoNums = new Set(topDongcheo.map(d => d.g.gungNum));

      // 동처 요약 카드 렌더링
      if (topDongcheo.length > 0) {
        document.getElementById("dongcheoSummary").style.display = "block";
        document.getElementById("dongcheoText").innerHTML = topDongcheo.map(({ g, score }) => {
          const reasons = [];
          if (g.relation.label.includes("극")) reasons.push(`${g.relation.label} 충돌`);
          if (g.palmun?.score <= 15) reasons.push(`${g.palmun.label} 발동`);
          if (g.palmun?.score >= 95) reasons.push(`${g.palmun.label} 발동`);
          if (g.sinsal?.length) reasons.push(g.sinsal.map(s => s.label).join("·"));
          return `<strong style="color:#ddb840">${g.gungInfo.name}(${g.gungInfo.direction})</strong> — ${reasons.join(", ")}`;
        }).join("<br>");
      }

      // 구궁도 그리드 렌더링 (전역 함수)
      renderGrid();



      // 길흉 요약 — 결합 점수(생극 45% + 팔문 45% + 신살 10%) 기준 정렬
      const giljung = r.giljung || deriveGiljung(board, analysis.segungIndex);
      combinedMap = {};
      [...giljung.gilbang, ...giljung.hyungbang, giljung.segung]
        .filter(Boolean)
        .forEach(item => { combinedMap[item.gungNum] = item.combined; });

      // combinedMap에 없는 궁(세궁 제외 외 나머지)도 보완 계산
      Object.values(board).forEach(g => {
        if (combinedMap[g.gungNum] === undefined) {
          const relationScore = g.relation.score;
          const palmunScore   = g.palmun?.score ?? 55;
          const sinsalPenalty = (g.sinsal || []).reduce((acc, s) => acc + (s.score || 0), 0);
          combinedMap[g.gungNum] = Math.max(0, Math.round(relationScore * 0.45 + palmunScore * 0.45 + sinsalPenalty * 0.1));
        }
      });

      const sorted = Object.values(board)
        .map(g => ({ g, combined: combinedMap[g.gungNum] }))
        .sort((a, b) => b.combined - a.combined);

      const list = document.getElementById("summaryList");
      list.innerHTML = "";
      sorted.forEach(({ g, combined }, i) => {
        const badge   = combinedBadge(combined);
        const comment = combinedComment(combined, g.gungInfo.name);
        const li = document.createElement("li");
        li.innerHTML = `
          <span class="summary-rank">${i + 1}</span>
          <div class="summary-item-body">
            <div class="summary-item-header">
              <span class="summary-item-name">${g.gungInfo.name}</span>
              <span class="summary-item-dir">${g.gungInfo.direction}</span>
              <span class="score-badge badge-${badge}" style="position:static;">${badge} ${combined}점</span>
              ${g.palmun ? `<span class="palmun-badge" style="font-size:10px; padding:2px 6px; border-radius:4px; background:rgba(180,140,80,0.1); color:var(--gold); border:1px solid var(--border);">${g.palmun.label}</span>` : ""}
            </div>
            <div class="summary-item-desc">${comment}</div>
            ${g.palmun ? `<div class="summary-item-desc" style="color:var(--text-muted); font-size:12px; margin-top:2px;">📌 ${g.palmun.desc}</div>` : ""}
            <div class="summary-item-desc" style="color:var(--text-dim); font-size:12px; margin-top:2px;">${g.relation.desc}</div>
            ${g.relation.detail ? `
            <div class="summary-item-detail">
              <span>${g.relation.detail}</span>
            </div>` : ""}
            ${(g.sinsal && g.sinsal.length > 0) ? `
            <div class="summary-item-detail" style="border-left-color: rgba(200,60,40,0.4); background: rgba(180,50,30,0.06);">
              <span class="summary-item-detail-arrow" style="color:#e07060;">⚡</span>
              <span style="color:#c87060;">${g.sinsal.map(s => s.label).join(", ")} 발동 — ${g.sinsal.map(s => s.desc).join(" ")}</span>
            </div>` : ""}
          </div>
        `;
        list.appendChild(li);
      });
    }

    // ── 궁별 고유 해설 ─────────────────────────────────────────
    const GUNG_MEANING = {
      1: { keyword:"지혜 / 내면 / 인내 / 흐름",   life:"수(水)의 기운으로 깊이 스며들 듯 상황을 파악하고 때를 기다리는 전략이 유효한 자리입니다. 내면의 성찰과 은밀한 움직임이 빛을 발합니다." },
      2: { keyword:"결실 / 협력 / 헌신 / 수용",   life:"땅의 어머니 기운으로 성실히 가꾼 것이 결실을 맺는 자리입니다. 독단보다 함께 가는 방식이 더 큰 성과를 냅니다." },
      3: { keyword:"도전 / 시작 / 추진력 / 성장", life:"봄의 우레 같은 약동하는 기운으로 새 일을 시작하고 앞으로 나아가는 자리입니다. 추진력이 강하지만 충동적 결정을 경계해야 합니다." },
      4: { keyword:"유연 / 소통 / 침투 / 계약",   life:"바람처럼 스며드는 유연한 기운의 자리입니다. 강압보다 설득, 고집보다 적응이 성과를 만들며 문서·계약·소통과 인연이 깊습니다." },
      5: { keyword:"변화 / 중심 / 주도 / 전환점", life:"모든 기운이 모이는 중앙의 자리로 변화와 주도권이 동시에 작용합니다. 안정과 혼란이 공존하며 중심을 잡는 자가 판을 주도합니다." },
      6: { keyword:"권위 / 리더십 / 결단 / 하늘", life:"하늘의 아버지 기운으로 리더십과 권위가 드러나는 자리입니다. 결단력이 강점이지만 유연성을 잃으면 고집이 되니 균형이 필요합니다." },
      7: { keyword:"기쁨 / 표현 / 교류 / 설득",   life:"기쁨과 열린 소통의 기운이 가득한 자리입니다. 말과 표현이 힘이 되며 인간관계와 교류에서 운이 열립니다. 가볍고 방만해지지 않도록 주의합니다." },
      8: { keyword:"정지 / 내실 / 마무리 / 축적", life:"산처럼 멈추고 지키는 기운의 자리입니다. 무리한 확장보다 기반을 단단히 다지고 과거를 마무리하는 것이 이롭습니다." },
      9: { keyword:"명예 / 빛 / 문서 / 인정",     life:"밝은 빛과 명예의 기운으로 드러남과 인정이 따르는 자리입니다. 학문·문서·명성과 연결되며 감정 기복을 다스리면 빛이 더욱 강해집니다." },
    };

    function showDetail(g, isSegung) {
      const detail = document.getElementById("gungDetail");
      detail.classList.add("active");

      const gm = GUNG_MEANING[g.gungNum] || {};

      // 제목 (세궁·동처 표시)
      const isDc = dongcheoNums.has(g.gungNum);
      document.getElementById("detailTitle").textContent =
        g.gungInfo.name
        + (isSegung ? " ★ 세궁(나의 방)" : "")
        + (isDc     ? " ⚡ 동처(활성)" : "");

      // 메타 행
      document.getElementById("detailDir").textContent      = g.gungInfo.direction;
      document.getElementById("detailOhaeng").textContent   = g.gungInfo.ohaeng + "  ·  " + (gm.keyword || g.gungInfo.desc);
      document.getElementById("detailJiban").textContent    = g.jibansu;
      document.getElementById("detailCheon").textContent    = g.cheonbansu;
      document.getElementById("detailRelation").textContent = g.relation.label;

      // combined 점수 기반 배지·멘트 표시
      const detailCombined = combinedMap[g.gungNum] ?? g.relation.score;
      const detailBadge    = combinedBadge(detailCombined);
      const detailComment  = combinedComment(detailCombined, g.gungInfo.name);
      document.getElementById("detailScore").textContent =
        detailBadge + " " + detailCombined + "점";

      // 팔문 행
      const pmKey2   = palmunBoard[g.gungNum] || "";
      const pmInfo2  = pmKey2 ? (PALMUN[pmKey2] || null) : null;
      const pmRowEl  = document.getElementById("detailPalmunRow");
      const pmValEl  = document.getElementById("detailPalmun");
      if (pmInfo2) {
        pmRowEl.style.display = "";
        pmValEl.innerHTML =
          `<strong style="color:var(--gold); font-weight:700;">${pmInfo2.label}</strong>` +
          `<span style="color:var(--text-muted);"> — ${pmInfo2.desc}</span>`;
      } else {
        pmRowEl.style.display = "none";
      }

      // ① 종합 멘트 (점수 구간 기반)
      document.getElementById("detailDesc").textContent = detailComment;

      // ② 궁 고유 해설
      const lifeEl = document.getElementById("detailLife");
      if (lifeEl) lifeEl.textContent = gm.life || g.gungInfo.desc;

      // ② 천반·지반 관계 해설 — 팔문 설명 우선, 생극 설명 보조로 표시
      const extraEl = document.getElementById("detailExtra");
      const pmDescText = pmInfo2 ? pmInfo2.desc : "";
      extraEl.textContent = pmDescText || g.relation.desc;

      // ③ 부연설명 — 팔문 detail 우선, 없으면 생극 detail
      const subEl = document.getElementById("detailSub");
      const subText = g.relation.detail || "";
      if (subText) {
        subEl.style.display = "flex";
        subEl.innerHTML = '<span>' + subText + '</span>';
      } else {
        subEl.style.display = "none";
        subEl.innerHTML = "";
      }

      // ④ 신살
      const sinsalWrap = document.getElementById("detailSinsalWrap");
      const sinsalList = document.getElementById("detailSinsalList");
      if (g.sinsal && g.sinsal.length > 0) {
        sinsalWrap.style.display = "block";
        sinsalList.innerHTML = g.sinsal.map(s => `
          <div class="sinsal-detail-block">
            <strong>${s.symbol || "⚡"} ${s.label} — ${s.severity}</strong>
            ${s.desc}<br>
            <span style="opacity:.8; font-size:11px;">${s.detail}</span>
          </div>`).join("");
      } else {
        sinsalWrap.style.display = "none";
        sinsalList.innerHTML = "";
      }

      detail.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  </script>

</body>
</html>
