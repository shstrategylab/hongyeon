<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍연 마스터 — 구궁도 결과</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .meta-tag {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .meta-tag span { color: var(--gold); }

    .gung-detail {
      display: none;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 16px;
    }
    .gung-detail.active { display: block; }
    .gung-detail-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .gung-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-muted);
    }
    .gung-detail-row:last-child { border-bottom: none; }
    .gung-detail-row strong { color: var(--text-main); }

    /* summary 스타일은 style.css로 이관 */

    /* ── 세궁 해설 블록 ── */
    .segung-summary {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: rgba(180,140,80,0.05);
      border: 1px solid rgba(180,140,80,0.2);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 20px;
    }
    .segung-summary-left {
      text-align: center;
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      padding: 12px 18px;
      flex-shrink: 0;
    }
    .segung-num {
      font-family: 'Noto Serif KR', serif;
      font-size: 30px;
      color: var(--gold);
      line-height: 1;
    }
    .segung-gung-name {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      white-space: nowrap;
    }
    .segung-summary-right {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .segung-meta {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .segung-desc {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.75;
    }
    .segung-relation {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 7px 11px;
      background: rgba(255,255,255,0.025);
      border-left: 2px solid rgba(180,140,80,0.35);
      border-radius: 0 4px 4px 0;
    }
    .segung-relation strong { color: var(--gold); font-weight: 600; }

    /* ── 구궁 셀 추가 요소 ── */
    .gung-cell .gung-hanja {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      color: rgba(200,169,110,0.28);
      position: absolute;
      top: 7px;
      left: 8px;
      line-height: 1;
    }
    .gung-cell .gung-keyword {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      line-height: 1.35;
      margin-top: 2px;
      opacity: 0.85;
      word-break: keep-all;
    }

    /* ── 상세 패널 내부 ── */
    .detail-gung-life {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.8;
      padding: 10px 12px;
      background: rgba(180,140,80,0.05);
      border-left: 2px solid rgba(180,140,80,0.4);
      border-radius: 0 4px 4px 0;
    }
    .detail-relation-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.75;
    }
  </style>
</head>
<body>

  <script src="js/header.js"></script>

  <main class="container">

    <!-- 메타 정보 -->
    <div class="meta-bar" id="metaBar">
      <div class="meta-tag">절기: <span id="jeolgiName">-</span></div>
      <div class="meta-tag">구분: <span id="dunType">-</span></div>
      <div class="meta-tag">국수: <span id="baseGuksu">-</span>국</div>
      <div class="meta-tag">지반수: <span id="jibansu">-</span></div>
      <div class="meta-tag">천반수: <span id="cheonbansu">-</span></div>
    </div>

    <!-- 경고 메시지 -->
    <div id="warnBox" style="display:none; background:rgba(180,140,80,0.08);
      border:1px solid var(--border-glow); border-radius:8px;
      padding:12px 16px; margin-bottom:16px; font-size:13px; color:var(--gold);">
    </div>

    <!-- 구궁도 -->
    <div class="card">
      <div class="card-title">구궁도 (세궁: <span id="segungLabel" class="text-gold">-</span>)</div>

      <!-- 세궁 해설 -->
      <div class="segung-summary" id="segungSummary">
        <div class="segung-summary-left">
          <div class="segung-num" id="ssNum">-</div>
          <div class="segung-gung-name" id="ssGungName">-</div>
        </div>
        <div class="segung-summary-right">
          <div class="segung-meta" id="ssMeta">-</div>
          <div class="segung-desc" id="ssDesc">-</div>
          <div class="segung-relation" id="ssRelation"></div>
        </div>
      </div>

      <div class="gugung-grid" id="gugungGrid"></div>

      <!-- 클릭 시 상세 표시 -->
      <div class="gung-detail" id="gungDetail">
        <div class="gung-detail-title" id="detailTitle">—</div>
        <div class="gung-detail-row">
          <span>방위</span><strong id="detailDir">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>오행</span><strong id="detailOhaeng">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>지반수</span><strong id="detailJiban">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>천반수</span><strong id="detailCheon">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>관계</span><strong id="detailRelation">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>운세 점수</span><strong id="detailScore">-</strong>
        </div>
        <div class="gung-detail-row" id="detailPalmunRow">
          <span>팔문</span><strong id="detailPalmun" style="text-align:right; max-width:70%; font-size:12px;">-</strong>
        </div>
        <!-- ① 궁 고유 해설 -->
        <div class="detail-gung-life mt-8" id="detailDesc">-</div>
        <!-- ② 천반·지반 관계 해설 -->
        <div class="detail-relation-desc mt-8" id="detailExtra">-</div>
        <!-- ③ ↳ 부연설명 -->
        <div class="summary-item-detail mt-8" id="detailSub" style="display:none"></div>
      </div>
    </div>

    <!-- 길흉 요약 -->
    <div class="card">
      <div class="card-title">길흉 요약</div>
      <ul class="summary-list" id="summaryList"></ul>
    </div>

    <!-- 이동 버튼 -->
    <div style="display: flex; gap: 10px; margin-bottom: 32px;">
      <a href="premium.html" class="btn btn-secondary" style="text-decoration: none;">
        🔒 심층 풀이 보기
      </a>
      <a href="prompt.html" class="btn btn-secondary" style="text-decoration: none;">
        ✦ AI 프롬프트 생성
      </a>
    </div>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/data-jeolgi.js"></script>
  <script src="js/data-ganji.js"></script>
  <script src="js/data-gugung.js"></script>
  <script src="js/data-yukhin.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/firebase.js"></script>

  <script>
    // 저장된 결과 불러오기
    const result = JSON.parse(sessionStorage.getItem("hongyeon_result") || "null");
    let palmunBoard = {};   // showDetail에서도 참조

    if (!result) {
      alert("입력 데이터가 없습니다. 처음부터 시작해주세요.");
      window.location.href = "index.html";
    } else {
      renderResult(result);
    }

    function renderResult(r) {
      const { meta, analysis, board } = r;

      // 메타 정보
      document.getElementById("jeolgiName").textContent  = meta.jeolgiName;
      document.getElementById("dunType").textContent     = meta.type;
      document.getElementById("baseGuksu").textContent   = meta.baseGuksu;
      document.getElementById("jibansu").textContent     = analysis.jibanHong;
      document.getElementById("cheonbansu").textContent  = analysis.cheonbanHong;
      // 경고 표시
      if (meta.warning) {
        const wb = document.getElementById("warnBox");
        wb.textContent = "⚠️ " + meta.warning;
        wb.style.display = "block";
      }

      document.getElementById("segungLabel").textContent =
        `${analysis.segungIndex}번 ${analysis.segungName}` +
        (analysis.dayGanOhaeng ? ` (일간 ${analysis.dayGanOhaeng})` : "");

      // ── 세궁 해설 렌더링 ──────────────────────────
      const segung = board[analysis.segungIndex];
      if (segung) {
        const sg = segung.gungInfo;
        const sr = segung.relation;

        document.getElementById("ssNum").textContent      = analysis.segungIndex;
        document.getElementById("ssGungName").textContent = sg.name;
        document.getElementById("ssMeta").textContent     =
          `${sg.direction} · ${sg.ohaeng} · ${sg.desc}`;

        // 세궁 도출 근거 설명
        const ganDesc = analysis.dayGanOhaeng
          ? `일간 오행(${analysis.dayGanOhaeng})을 기준으로 ` : "";
        document.getElementById("ssDesc").textContent =
          `${ganDesc}${meta.baseGuksu}국 ${meta.type} 포국에서 세궁은 ` +
          `${sg.name}(${sg.direction})입니다. ` +
          `이 방이 현재 나의 중심 자리로, 지반수 ${segung.jibansu}에 ` +
          `천반수 ${segung.cheonbansu}이 올라앉은 구조입니다. ` +
          `${sg.desc}의 기운이 주도하는 시기로 ${sr.summary}.`;

        // 관계 요약
        document.getElementById("ssRelation").innerHTML =
          `<strong>${sr.label}</strong> · ${sr.score}점 &nbsp;—&nbsp; ${sr.desc}` +
          (sr.detail ? `<br><span style="opacity:.8">↳ ${sr.detail}</span>` : "");
      }

      // 팔문 배속
      palmunBoard = (typeof buildPalmunBoard === "function")
        ? buildPalmunBoard(analysis.segungIndex)
        : {};

      // 구궁도 그리드 렌더링
      // CSS Grid 전통 방위 순서: [4,9,2 / 3,5,7 / 8,1,6]
      const gridOrder = [4, 9, 2, 3, 5, 7, 8, 1, 6];
      const grid = document.getElementById("gugungGrid");
      grid.innerHTML = "";

      gridOrder.forEach(gungNum => {
        const g = board[gungNum];
        if (!g) return;

        const rel = g.relation;
        const isSegung = g.isSegung || gungNum === analysis.segungIndex;
        const scoreClass =
          rel.score >= 80 ? "high" :
          rel.score >= 40 ? "mid" : "low";

        const cell = document.createElement("div");
        cell.className = "gung-cell" + (isSegung ? " is-segung" : "");
        cell.dataset.gungNum = gungNum;
        const pmKey  = palmunBoard[gungNum] || "";
        const pmInfo = pmKey ? (PALMUN[pmKey] || { label: pmKey, score: 50 }) : null;
        const pmClass = pmInfo
          ? (pmInfo.score >= 80 ? "palmun-gil" : pmInfo.score >= 50 ? "palmun-mid" : "palmun-흉")
          : "";

        cell.innerHTML = `
          <span class="score-badge badge-${rel.badge}">${rel.badge}</span>
          <span class="gung-hanja">${g.gungInfo.hanja}</span>
          <span class="gung-name">${g.gungInfo.direction}</span>
          <span class="gung-num">${g.jibansu}</span>
          <span class="gung-cheonban">天 ${g.cheonbansu}</span>
          <span class="gung-keyword">${g.gungInfo.desc}</span>
          ${pmInfo ? `<span class="palmun-badge ${pmClass}">${pmInfo.label.replace(/\(.*\)/,"")}</span>` : ""}
          <div class="score-bar-wrap" style="width:100%; margin-top:4px;">
            <div class="score-bar ${scoreClass}" style="width:${rel.score}%"></div>
          </div>
        `;

        cell.addEventListener("click", () => showDetail(g, isSegung));
        grid.appendChild(cell);
      });

      // 길흉 요약 (점수 내림차순)
      const sorted = Object.values(board).sort((a, b) => b.relation.score - a.relation.score);
      const list = document.getElementById("summaryList");
      list.innerHTML = "";
      sorted.forEach((g, i) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <span class="summary-rank">${i + 1}</span>
          <div class="summary-item-body">
            <div class="summary-item-header">
              <span class="summary-item-name">${g.gungInfo.name}</span>
              <span class="summary-item-dir">${g.gungInfo.direction}</span>
              <span class="score-badge badge-${g.relation.badge}" style="position:static;">${g.relation.badge}</span>
            </div>
            <div class="summary-item-desc">${g.relation.desc}</div>
            ${g.relation.detail ? `
            <div class="summary-item-detail">
              <span class="summary-item-detail-arrow">↳</span>
              <span>${g.relation.detail}</span>
            </div>` : ""}
          </div>
        `;
        list.appendChild(li);
      });
    }

    // ── 궁별 고유 해설 ─────────────────────────────────────────
    const GUNG_MEANING = {
      1: { keyword:"지혜 / 내면 / 인내 / 흐름",   life:"수(水)의 기운으로 깊이 스며들 듯 상황을 파악하고 때를 기다리는 전략이 유효한 자리입니다. 내면의 성찰과 은밀한 움직임이 빛을 발합니다." },
      2: { keyword:"결실 / 협력 / 헌신 / 수용",   life:"땅의 어머니 기운으로 성실히 가꾼 것이 결실을 맺는 자리입니다. 독단보다 함께 가는 방식이 더 큰 성과를 냅니다." },
      3: { keyword:"도전 / 시작 / 추진력 / 성장", life:"봄의 우레 같은 약동하는 기운으로 새 일을 시작하고 앞으로 나아가는 자리입니다. 추진력이 강하지만 충동적 결정을 경계해야 합니다." },
      4: { keyword:"유연 / 소통 / 침투 / 계약",   life:"바람처럼 스며드는 유연한 기운의 자리입니다. 강압보다 설득, 고집보다 적응이 성과를 만들며 문서·계약·소통과 인연이 깊습니다." },
      5: { keyword:"변화 / 중심 / 주도 / 전환점", life:"모든 기운이 모이는 중앙의 자리로 변화와 주도권이 동시에 작용합니다. 안정과 혼란이 공존하며 중심을 잡는 자가 판을 주도합니다." },
      6: { keyword:"권위 / 리더십 / 결단 / 하늘", life:"하늘의 아버지 기운으로 리더십과 권위가 드러나는 자리입니다. 결단력이 강점이지만 유연성을 잃으면 고집이 되니 균형이 필요합니다." },
      7: { keyword:"기쁨 / 표현 / 교류 / 설득",   life:"기쁨과 열린 소통의 기운이 가득한 자리입니다. 말과 표현이 힘이 되며 인간관계와 교류에서 운이 열립니다. 가볍고 방만해지지 않도록 주의합니다." },
      8: { keyword:"정지 / 내실 / 마무리 / 축적", life:"산처럼 멈추고 지키는 기운의 자리입니다. 무리한 확장보다 기반을 단단히 다지고 과거를 마무리하는 것이 이롭습니다." },
      9: { keyword:"명예 / 빛 / 문서 / 인정",     life:"밝은 빛과 명예의 기운으로 드러남과 인정이 따르는 자리입니다. 학문·문서·명성과 연결되며 감정 기복을 다스리면 빛이 더욱 강해집니다." },
    };

    function showDetail(g, isSegung) {
      const detail = document.getElementById("gungDetail");
      detail.classList.add("active");

      const gm = GUNG_MEANING[g.gungNum] || {};

      // 제목
      document.getElementById("detailTitle").textContent =
        g.gungInfo.name + (isSegung ? " ★ 세궁(나의 방)" : "");

      // 메타 행
      document.getElementById("detailDir").textContent      = g.gungInfo.direction;
      document.getElementById("detailOhaeng").textContent   = g.gungInfo.ohaeng + "  ·  " + (gm.keyword || g.gungInfo.desc);
      document.getElementById("detailJiban").textContent    = g.jibansu;
      document.getElementById("detailCheon").textContent    = g.cheonbansu;
      document.getElementById("detailRelation").textContent = g.relation.label;
      document.getElementById("detailScore").textContent    = g.relation.score + "점";

      // 팔문 행
      const pmKey2   = palmunBoard[g.gungNum] || "";
      const pmInfo2  = pmKey2 ? (PALMUN[pmKey2] || null) : null;
      const pmRowEl  = document.getElementById("detailPalmunRow");
      const pmValEl  = document.getElementById("detailPalmun");
      if (pmInfo2) {
        pmRowEl.style.display = "";
        pmValEl.textContent   = pmInfo2.label + "  —  " + pmInfo2.desc;
      } else {
        pmRowEl.style.display = "none";
      }

      // ① 궁 고유 해설 — 이 자리는 어떤 기운인가
      document.getElementById("detailDesc").textContent = gm.life || g.gungInfo.desc;

      // ② 천반·지반 관계 해설 + ↳ 부연
      const extraEl = document.getElementById("detailExtra");
      extraEl.textContent = g.relation.desc;

      // ③ ↳ 부연설명 — 별도 블록
      const subEl = document.getElementById("detailSub");
      if (g.relation.detail) {
        subEl.style.display = "flex";
        subEl.innerHTML =
          '<span class="summary-item-detail-arrow">↳</span><span>' + g.relation.detail + '</span>';
      } else {
        subEl.style.display = "none";
        subEl.innerHTML = "";
      }

      detail.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  </script>

</body>
</html>
