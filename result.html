<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍연 마스터 — 구궁도 결과</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .meta-tag {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .meta-tag span { color: var(--gold); }

    .gung-detail {
      display: none;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 16px;
    }
    .gung-detail.active { display: block; }
    .gung-detail-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .gung-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-muted);
    }
    .gung-detail-row:last-child { border-bottom: none; }
    .gung-detail-row strong { color: var(--text-main); }

    /* summary 스타일은 style.css로 이관 */

    /* ── 세궁 해설 블록 ── */
    .segung-summary {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: rgba(180,140,80,0.05);
      border: 1px solid rgba(180,140,80,0.2);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 20px;
    }
    .segung-summary-left {
      text-align: center;
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      padding: 12px 18px;
      flex-shrink: 0;
    }
    .segung-num {
      font-family: 'Noto Serif KR', serif;
      font-size: 30px;
      color: var(--gold);
      line-height: 1;
    }
    .segung-gung-name {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      white-space: nowrap;
    }
    .segung-summary-right {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .segung-meta {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .segung-desc {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.75;
    }
    .segung-relation {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 7px 11px;
      background: rgba(255,255,255,0.025);
      border-left: 2px solid rgba(180,140,80,0.35);
      border-radius: 0 4px 4px 0;
    }
    .segung-relation strong { color: var(--gold); font-weight: 600; }
  </style>
</head>
<body>

  <script src="js/header.js"></script>

  <main class="container">

    <!-- 메타 정보 -->
    <div class="meta-bar" id="metaBar">
      <div class="meta-tag">절기: <span id="jeolgiName">-</span></div>
      <div class="meta-tag">구분: <span id="dunType">-</span></div>
      <div class="meta-tag">국수: <span id="baseGuksu">-</span>국</div>
      <div class="meta-tag">지반수: <span id="jibansu">-</span></div>
      <div class="meta-tag">천반수: <span id="cheonbansu">-</span></div>
    </div>

    <!-- 경고 메시지 -->
    <div id="warnBox" style="display:none; background:rgba(180,140,80,0.08);
      border:1px solid var(--border-glow); border-radius:8px;
      padding:12px 16px; margin-bottom:16px; font-size:13px; color:var(--gold);">
    </div>

    <!-- 구궁도 -->
    <div class="card">
      <div class="card-title">구궁도 (세궁: <span id="segungLabel" class="text-gold">-</span>)</div>

      <!-- 세궁 해설 -->
      <div class="segung-summary" id="segungSummary">
        <div class="segung-summary-left">
          <div class="segung-num" id="ssNum">-</div>
          <div class="segung-gung-name" id="ssGungName">-</div>
        </div>
        <div class="segung-summary-right">
          <div class="segung-meta" id="ssMeta">-</div>
          <div class="segung-desc" id="ssDesc">-</div>
          <div class="segung-relation" id="ssRelation"></div>
        </div>
      </div>

      <div class="gugung-grid" id="gugungGrid"></div>

      <!-- 클릭 시 상세 표시 -->
      <div class="gung-detail" id="gungDetail">
        <div class="gung-detail-title" id="detailTitle">—</div>
        <div class="gung-detail-row">
          <span>방위</span><strong id="detailDir">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>오행</span><strong id="detailOhaeng">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>지반수</span><strong id="detailJiban">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>천반수</span><strong id="detailCheon">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>관계</span><strong id="detailRelation">-</strong>
        </div>
        <div class="gung-detail-row">
          <span>운세 점수</span><strong id="detailScore">-</strong>
        </div>
        <p class="mt-8 text-sm" style="color: var(--text-main);" id="detailDesc">-</p>
        <p class="mt-8 text-sm text-muted" id="detailExtra">-</p>
      </div>
    </div>

    <!-- 길흉 요약 -->
    <div class="card">
      <div class="card-title">길흉 요약</div>
      <ul class="summary-list" id="summaryList"></ul>
    </div>

    <!-- 이동 버튼 -->
    <div style="display: flex; gap: 10px; margin-bottom: 32px;">
      <a href="premium.html" class="btn btn-secondary" style="text-decoration: none;">
        🔒 심층 풀이 보기
      </a>
      <a href="prompt.html" class="btn btn-secondary" style="text-decoration: none;">
        ✦ AI 프롬프트 생성
      </a>
    </div>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/data-jeolgi.js"></script>
  <script src="js/data-ganji.js"></script>
  <script src="js/data-gugung.js"></script>
  <script src="js/data-yukhin.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/firebase.js"></script>

  <script>
    // 저장된 결과 불러오기
    const result = JSON.parse(sessionStorage.getItem("hongyeon_result") || "null");

    if (!result) {
      alert("입력 데이터가 없습니다. 처음부터 시작해주세요.");
      window.location.href = "index.html";
    } else {
      renderResult(result);
    }

    function renderResult(r) {
      const { meta, analysis, board } = r;

      // 메타 정보
      document.getElementById("jeolgiName").textContent  = meta.jeolgiName;
      document.getElementById("dunType").textContent     = meta.type;
      document.getElementById("baseGuksu").textContent   = meta.baseGuksu;
      document.getElementById("jibansu").textContent     = analysis.jibanHong;
      document.getElementById("cheonbansu").textContent  = analysis.cheonbanHong;
      // 경고 표시
      if (meta.warning) {
        const wb = document.getElementById("warnBox");
        wb.textContent = "⚠️ " + meta.warning;
        wb.style.display = "block";
      }

      document.getElementById("segungLabel").textContent =
        `${analysis.segungIndex}번 ${analysis.segungName}` +
        (analysis.dayGanOhaeng ? ` (일간 ${analysis.dayGanOhaeng})` : "");

      // ── 세궁 해설 렌더링 ──────────────────────────
      const segung = board[analysis.segungIndex];
      if (segung) {
        const sg = segung.gungInfo;
        const sr = segung.relation;

        document.getElementById("ssNum").textContent      = analysis.segungIndex;
        document.getElementById("ssGungName").textContent = sg.name;
        document.getElementById("ssMeta").textContent     =
          `${sg.direction} · ${sg.ohaeng} · ${sg.desc}`;

        // 세궁 도출 근거 설명
        const ganDesc = analysis.dayGanOhaeng
          ? `일간 오행(${analysis.dayGanOhaeng})을 기준으로 ` : "";
        document.getElementById("ssDesc").textContent =
          `${ganDesc}${meta.baseGuksu}국 ${meta.type} 포국에서 세궁은 ` +
          `${sg.name}(${sg.direction})입니다. ` +
          `이 방이 현재 나의 중심 자리로, 지반수 ${segung.jibansu}에 ` +
          `천반수 ${segung.cheonbansu}이 올라앉은 구조입니다. ` +
          `${sg.desc}의 기운이 주도하는 시기로 ${sr.summary}.`;

        // 관계 요약
        document.getElementById("ssRelation").innerHTML =
          `<strong>${sr.label}</strong> · ${sr.score}점 &nbsp;—&nbsp; ${sr.desc}` +
          (sr.detail ? `<br><span style="opacity:.8">↳ ${sr.detail}</span>` : "");
      }

      // 구궁도 그리드 렌더링
      // CSS Grid 전통 방위 순서: [4,9,2 / 3,5,7 / 8,1,6]
      const gridOrder = [4, 9, 2, 3, 5, 7, 8, 1, 6];
      const grid = document.getElementById("gugungGrid");
      grid.innerHTML = "";

      gridOrder.forEach(gungNum => {
        const g = board[gungNum];
        if (!g) return;

        const rel = g.relation;
        const isSegung = g.isSegung || gungNum === analysis.segungIndex;
        const scoreClass =
          rel.score >= 80 ? "high" :
          rel.score >= 40 ? "mid" : "low";

        const cell = document.createElement("div");
        cell.className = "gung-cell" + (isSegung ? " is-segung" : "");
        cell.dataset.gungNum = gungNum;
        cell.innerHTML = `
          <span class="score-badge badge-${rel.badge}">${rel.badge}</span>
          <span class="gung-name">${g.gungInfo.direction}</span>
          <span class="gung-num">${g.jibansu}</span>
          <span class="gung-cheonban">天 ${g.cheonbansu}</span>
          <div class="score-bar-wrap" style="width:100%; margin-top:4px;">
            <div class="score-bar ${scoreClass}" style="width:${rel.score}%"></div>
          </div>
        `;

        cell.addEventListener("click", () => showDetail(g, isSegung));
        grid.appendChild(cell);
      });

      // 길흉 요약 (점수 내림차순)
      const sorted = Object.values(board).sort((a, b) => b.relation.score - a.relation.score);
      const list = document.getElementById("summaryList");
      list.innerHTML = "";
      sorted.forEach((g, i) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <span class="summary-rank">${i + 1}</span>
          <div class="summary-item-body">
            <div class="summary-item-header">
              <span class="summary-item-name">${g.gungInfo.name}</span>
              <span class="summary-item-dir">${g.gungInfo.direction}</span>
              <span class="score-badge badge-${g.relation.badge}" style="position:static;">${g.relation.badge}</span>
            </div>
            <div class="summary-item-desc">${g.relation.desc}</div>
            ${g.relation.detail ? `
            <div class="summary-item-detail">
              <span class="summary-item-detail-arrow">↳</span>
              <span>${g.relation.detail}</span>
            </div>` : ""}
          </div>
        `;
        list.appendChild(li);
      });
    }

    function showDetail(g, isSegung) {
      const detail = document.getElementById("gungDetail");
      detail.classList.add("active");

      document.getElementById("detailTitle").textContent =
        g.gungInfo.name + (isSegung ? " ★ 세궁(나의 방)" : "");
      document.getElementById("detailDir").textContent     = g.gungInfo.direction;
      document.getElementById("detailOhaeng").textContent  = g.gungInfo.ohaeng;
      document.getElementById("detailJiban").textContent   = g.jibansu;
      document.getElementById("detailCheon").textContent   = g.cheonbansu;
      document.getElementById("detailRelation").textContent = g.relation.label;
      document.getElementById("detailScore").textContent   = g.relation.score + "점";
      document.getElementById("detailDesc").textContent    = g.relation.desc;
      document.getElementById("detailExtra").textContent   = g.relation.detail ? "↳ " + g.relation.detail : "";

      detail.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  </script>

</body>
</html>
