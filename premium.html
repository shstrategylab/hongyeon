<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍연 마스터 — 심층 풀이</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .fortune-area {
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .fortune-area:last-child { border-bottom: none; }
    .fortune-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .fortune-title {
      font-size: 14px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .fortune-icon { font-size: 18px; }
    .paywall-blur {
      filter: blur(5px);
      pointer-events: none;
      user-select: none;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .unlock-section {
      text-align: center;
      padding: 24px;
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: var(--radius);
      margin: 20px 0;
    }
    .unlock-section .price {
      font-family: 'Noto Serif KR', serif;
      font-size: 28px;
      color: var(--gold);
      margin: 12px 0 4px;
    }
    .unlock-section .price-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .free-badge {
      display: inline-block;
      background: rgba(74, 140, 92, 0.15);
      border: 1px solid rgba(74, 140, 92, 0.3);
      border-radius: 4px;
      color: #6dbf87;
      font-size: 11px;
      padding: 2px 8px;
    }
    .premium-badge {
      display: inline-block;
      background: rgba(180, 140, 80, 0.15);
      border: 1px solid var(--border-glow);
      border-radius: 4px;
      color: var(--gold);
      font-size: 11px;
      padding: 2px 8px;
    }
    .summary-item-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.9;
    }
    .summary-item-detail {
      display: flex;
      gap: 7px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 8px 12px;
      background: rgba(255,255,255,0.025);
      border-left: 2px solid rgba(180,140,80,0.35);
      border-radius: 0 4px 4px 0;
      margin-top: 6px;
    }
    .summary-item-detail-arrow {
      color: var(--gold);
      opacity: 0.6;
      flex-shrink: 0;
      margin-top: 1px;
    }
  </style>
</head>
<body>

  <script src="js/header.js"></script>

  <main class="container">

    <!-- 무료 미리보기 -->
    <div class="card">
      <div class="card-title">
        나의 방(세궁) 기본 풀이 <span class="free-badge">무료</span>
      </div>
      <div id="freeContent">
        <p style="color: var(--text-muted); font-size: 13px;">포국 데이터를 불러오는 중...</p>
      </div>
    </div>

    <!-- 잠금 해제 유도 -->
    <div class="unlock-section" id="unlockSection">
      <p style="font-size: 13px; color: var(--text-muted);">
        나머지 8개 방의 <strong style="color: var(--text-main);">재물·직장·건강·인간관계</strong> 심층 풀이
      </p>
      <div class="price">₩9,900</div>
      <div class="price-sub">1회 결제 · 평생 열람</div>
      <button class="btn btn-primary" style="max-width: 280px; margin: 0 auto;"
        onclick="handlePayment()">
        🔓 지금 잠금 해제하기
      </button>
      <p style="font-size: 11px; color: var(--text-dim); margin-top: 12px;">
        첫 가입 시 재물운 방 1개 무료 열람권 제공
      </p>
    </div>

    <!-- 유료 콘텐츠 (결제 후 표시) -->
    <div class="card" id="premiumCard" style="display: none;">
      <div class="card-title">
        십신·육친 전체 풀이 <span class="premium-badge">프리미엄</span>
      </div>
      <div id="premiumContent"></div>
    </div>

    <!-- 흐릿한 미리보기 (동적 렌더링) -->
    <div class="card" id="blurPreview">
      <div class="card-title">풀이 미리보기</div>
      <div class="paywall-blur" id="blurText">
        포국 데이터를 불러오는 중...
      </div>
    </div>

    <div style="padding-bottom: 32px;"></div>

  </main>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/data-jeolgi.js"></script>
  <script src="js/data-ganji.js"></script>
  <script src="js/data-gugung.js"></script>
  <script src="js/data-yukhin.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/firebase.js"></script>

  <script>
    let result, isPaid = false;

    window.addEventListener("load", async () => {
      result = JSON.parse(sessionStorage.getItem("hongyeon_result") || "null");
      if (!result) {
        document.getElementById("freeContent").innerHTML =
          `<p style="color:var(--text-muted); font-size:13px;">
            포국 데이터가 없습니다. <a href="index.html" style="color:var(--gold)">처음부터 시작</a>하세요.
          </p>`;
        return;
      }

      renderFreeContent();
      renderBlurPreview();

      // 결제 상태 확인
      isPaid = await checkPremiumStatus();
      if (isPaid) showPremium();
    });

    function renderFreeContent() {
      const { analysis, board } = result;
      const segung = board[analysis.segungIndex];
      if (!segung) return;

      const rel = segung.relation;
      document.getElementById("freeContent").innerHTML = `
        <div style="display:flex; align-items:center; gap:16px; margin-bottom:16px;">
          <div style="text-align:center; background:var(--bg-panel);
            border:1px solid var(--border-glow); border-radius:8px; padding:12px 20px;">
            <div style="font-size:28px; font-family:'Noto Serif KR',serif; color:var(--gold)">
              ${analysis.segungIndex}
            </div>
            <div style="font-size:11px; color:var(--text-muted)">${segung.gungInfo.name}</div>
          </div>
          <div>
            <div style="font-size:15px; color:var(--text-main); margin-bottom:6px;">
              ${segung.gungInfo.direction} · ${segung.gungInfo.ohaeng}
            </div>
            <div style="font-size:13px; color:var(--text-muted);">${segung.gungInfo.desc}</div>
            <div style="margin-top:8px;">
              <span class="score-badge badge-${rel.badge}" style="position:static; display:inline-block;">
                ${rel.badge}
              </span>
              <span style="font-size:13px; color:var(--text-muted); margin-left:8px;">
                ${rel.label} · ${rel.score}점
              </span>
            </div>
          </div>
        </div>
        <div class="summary-item-desc" style="font-size:13px; margin-bottom: ${rel.detail ? '8px' : '0'};">
          ${rel.summary}<br>${rel.desc}
        </div>
        ${rel.detail ? `
        <div class="summary-item-detail">
          <span>${rel.detail}</span>
        </div>` : ""}
      `;
    }

    // ── 블러 미리보기 동적 렌더링 ─────────────────
    // 실제 포국 결과에서 길방 1위 + 흉방 1위를 뽑아
    // 사용자별 맞춤 미리보기 텍스트를 생성합니다.
    function renderBlurPreview() {
      const { analysis, board, giljung } = result;
      const gj = giljung || deriveGiljung(board, analysis.segungIndex);

      // 길방 1위
      const topGil = gj.gilbang[0];
      // 흉방 1위
      const topHyung = gj.hyungbang[0];

      if (!topGil || !topHyung) return;

      const gilGung   = board[topGil.gungNum];
      const hyungGung = board[topHyung.gungNum];

      // 신살 경고 문구
      const sinsalWarn = hyungGung.sinsal?.length
        ? ` 특히 ${hyungGung.sinsal.map(s => s.label).join("·")}이 발동 중이니 각별히 주의하세요.`
        : "";

      const previewText =
        `당신의 ${topGil.direction} ${topGil.name}은 현재 ` +
        `${gilGung.palmun?.label || topGil.palmunLabel}(${gilGung.palmun?.score ?? ""}점) 구조로 ` +
        `${gilGung.relation.summary} 가장 활성화된 길방입니다. ` +
        `${gilGung.relation.desc} ` +
        `반면 ${topHyung.direction} ${topHyung.name}은 ` +
        `${hyungGung.palmun?.label || topHyung.palmunLabel} · ${hyungGung.relation.label} 흉방으로` +
        `${sinsalWarn} 이 방위의 이동·계약·투자는 피하시고...`;

      document.getElementById("blurText").textContent = previewText;
    }

    function showPremium() {
      document.getElementById("unlockSection").style.display = "none";
      document.getElementById("blurPreview").style.display = "none";
      document.getElementById("premiumCard").style.display = "block";

      const { analysis, board } = result;

      // [v2.6 수정] 기존: 세궁의 "위치 번호" 오행 vs 타궁의 "위치 번호" 오행 비교
      //             → 사람마다 달라지는 실제 홍국수 배치를 전혀 반영하지 못하던 문제.
      // 수정: engine.js가 일간(日干) 기준으로 이미 계산해 둔 board[gung].hongguksu의
      //       jibanSipsin/cheonSipsin(실제로 그 자리에 앉은 홍국수 기준 십신)을 그대로 사용.
      //       일간을 모르면(절기 근사 포국) hongguksu.*Sipsin이 전부 null이 되어
      //       자연스럽게 area.desc(기본 설명)로 폴백된다.
      const hasIlgan = !!analysis.dayGanOhaeng;

      const areas = Object.entries(FORTUNE_AREA);
      let html = "";

      if (!hasIlgan) {
        html = `<p style="font-size:12px; color:var(--text-dim); line-height:1.8; padding:8px 0;">
          일간(日干) 정보가 없어 십신 심층 풀이를 정밀하게 산출할 수 없습니다.
          만세력으로 확인한 사주팔자(일주)를 입력하시면 재물·직장·학업 등
          영역별 풀이가 정확해집니다.</p>`;
      }

      areas.forEach(([key, area]) => {
        // 해당 운세 영역(area.relCodes)에 해당하는 십신이 지반 또는 천반에 앉은 궁들을 찾는다.
        // 지반/천반 둘 다 후보가 될 수 있으므로, 궁 단위가 아니라 (궁, layer) 단위로 모은다.
        const candidates = [];
        Object.values(board).forEach(g => {
          if (g.gungNum === analysis.segungIndex) return; // 세궁(나 자신)은 제외
          const h = g.hongguksu;
          if (!h) return;
          if (h.jibanRelCode && area.relCodes.includes(h.jibanRelCode)) {
            candidates.push({ gung: g, layer: "jiban", sipsin: h.jibanSipsin });
          }
          if (h.cheonRelCode && area.relCodes.includes(h.cheonRelCode)) {
            candidates.push({ gung: g, layer: "cheon", sipsin: h.cheonSipsin });
          }
        });

        const topCand = candidates.sort((a, b) => b.gung.relation.score - a.gung.relation.score)[0];
        const top = topCand ? topCand.gung : null;

        const scoreLevel = top ? (top.relation.score >= 70 ? "high" : top.relation.score >= 40 ? "mid" : "low") : "mid";
        const template = top ? PREMIUM_TEMPLATE[scoreLevel] : null;

        html += `
          <div class="fortune-area">
            <div class="fortune-header">
              <div class="fortune-title">
                <span class="fortune-icon">${area.icon}</span>
                <strong>${area.label}</strong>
              </div>
              ${top ? `<span class="score-badge badge-${top.relation.badge}" style="position:static">
                ${top.relation.badge}</span>` : ""}
            </div>
            <div class="summary-item-desc" style="font-size:13px;">
              ${top ? template(top.gungInfo.name, top.gungInfo.direction, topCand.sipsin?.name || "") : area.desc}
            </div>
            ${top ? `<div class="summary-item-desc" style="color:var(--text-dim); font-size:12px; margin-top:2px;">
              📌 ${topCand.layer === "jiban" ? "지반" : "천반"} 홍국수 ${topCand.layer === "jiban" ? top.jibansu : top.cheonbansu} ·
              ${topCand.sipsin?.label || ""} ${topCand.sipsin?.businessLabel ? `(${topCand.sipsin.businessLabel})` : ""}
            </div>` : ""}
            ${top && top.relation.detail ? '<div class="summary-item-detail"><span>' + top.relation.detail + '</span></div>' : ""}
          </div>
        `;
      });

      document.getElementById("premiumContent").innerHTML = html;
    }

    // ── 결제 처리 (실제 PG 연동 필요) ─────────────
    async function handlePayment() {
      // TODO: 실제 결제 모듈(토스페이먼츠, 아임포트 등) 연동
      // 개발 테스트용 임시 처리
      const confirm = window.confirm(
        "결제 모듈 연동 전 테스트 모드입니다.\n잠금을 해제할까요?"
      );
      if (confirm) {
        await setPremiumStatus(true);
        showToast("잠금이 해제되었습니다! ✓");
        setTimeout(() => showPremium(), 800);
      }
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }
  </script>

</body>
</html>
