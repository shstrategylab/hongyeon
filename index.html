<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍연 마스터 — 홍연기문 운세</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .toggle-wrap { display:flex; gap:6px; margin-top:4px; }
    .toggle-btn {
      flex:1; padding:10px 8px; border-radius:6px; cursor:pointer;
      border:1px solid var(--border); background:var(--bg-panel);
      color:var(--text-muted); font-family:'Noto Sans KR',sans-serif;
      font-size:13px; transition:all 0.2s;
    }
    .toggle-btn.active {
      background:rgba(180,140,80,0.12);
      border-color:var(--border-glow);
      color:var(--gold);
    }
    .form-group { margin-bottom: 8px; }
    .form-row { gap: 8px; margin-bottom: 0; }
    .card { padding: 16px; }
  </style>

</head>
<body>

  <!-- 공통 헤더 -->
  <script src="js/header.js"></script>

  <main class="container">

    <div class="card">
      <div class="card-title">생년월일시 입력</div>

      <form id="sajuForm">

        <!-- 양력/음력 선택 -->
        <div class="form-group">
          <label class="form-label">양력 / 음력</label>
          <div class="toggle-wrap">
            <button type="button" class="toggle-btn active" id="btnSolar"
              onclick="setCalType('solar')">양력</button>
            <button type="button" class="toggle-btn" id="btnLunar"
              onclick="setCalType('lunar')">음력</button>
            <button type="button" class="toggle-btn" id="btnLeap"
              onclick="setCalType('leap')" style="display:none">음력 윤달</button>
          </div>
          <input type="hidden" id="calType" value="solar">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="birthYear">태어난 해</label>
            <input class="form-input" type="number" id="birthYear"
              placeholder="예: 1990" min="1900" max="2025" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="birthMonth">월</label>
            <select class="form-select" id="birthMonth" required>
              <option value="">월 선택</option>
              <option value="1">1월</option><option value="2">2월</option>
              <option value="3">3월</option><option value="4">4월</option>
              <option value="5">5월</option><option value="6">6월</option>
              <option value="7">7월</option><option value="8">8월</option>
              <option value="9">9월</option><option value="10">10월</option>
              <option value="11">11월</option><option value="12">12월</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="birthDay">일</label>
            <input class="form-input" type="number" id="birthDay"
              placeholder="예: 15" min="1" max="30" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="birthSiji">태어난 시(時)</label>
            <select class="form-select" id="birthSiji" required>
              <option value="">시 선택</option>
              <option value="자">자시(子時) — 밤 11시 ~ 새벽 1시</option>
              <option value="축">축시(丑時) — 새벽 1시 ~ 3시</option>
              <option value="인">인시(寅時) — 새벽 3시 ~ 5시</option>
              <option value="묘">묘시(卯時) — 새벽 5시 ~ 7시</option>
              <option value="진">진시(辰時) — 오전 7시 ~ 9시</option>
              <option value="사">사시(巳時) — 오전 9시 ~ 11시</option>
              <option value="오">오시(午時) — 오전 11시 ~ 오후 1시</option>
              <option value="미">미시(未時) — 오후 1시 ~ 3시</option>
              <option value="신">신시(申時) — 오후 3시 ~ 5시</option>
              <option value="유">유시(酉時) — 오후 5시 ~ 7시</option>
              <option value="술">술시(戌時) — 오후 7시 ~ 9시</option>
              <option value="해">해시(亥時) — 오후 9시 ~ 11시</option>
            </select>
            <p style="font-size:11px; color:var(--text-dim); margin-top:6px;">
              정확한 시간을 모르면 비워두세요.
            </p>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="gender">성별</label>
          <select class="form-select" id="gender">
            <option value="남">남성</option>
            <option value="여">여성</option>
          </select>
        </div>

        <!-- 사주팔자 직접 입력 (선택) -->
        <div style="margin-top: 4px; margin-bottom: 8px;">
          <p style="font-size: 12px; color: var(--text-muted); padding: 4px 0; margin-bottom: 4px;">
            사주팔자(간지) 직접 입력 — 선택사항
          </p>
          <div>
            <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 8px;">
              만세력으로 확인한 정확한 간지를 입력하면 더 정밀한 포국이 가능합니다.
            </p>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">연주 천간</label>
                <select class="form-select" id="yearGan">
                  <option value="">선택</option>
                  <option value="갑">갑(甲)</option><option value="을">을(乙)</option><option value="병">병(丙)</option><option value="정">정(丁)</option><option value="무">무(戊)</option><option value="기">기(己)</option><option value="경">경(庚)</option><option value="신">신(辛)</option><option value="임">임(壬)</option><option value="계">계(癸)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">연주 지지</label>
                <select class="form-select" id="yearJi">
                  <option value="">선택</option>
                  <option value="자">자(子)</option><option value="축">축(丑)</option><option value="인">인(寅)</option><option value="묘">묘(卯)</option><option value="진">진(辰)</option><option value="사">사(巳)</option><option value="오">오(午)</option><option value="미">미(未)</option><option value="신">신(申)</option><option value="유">유(酉)</option><option value="술">술(戌)</option><option value="해">해(亥)</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">월주 천간</label>
                <select class="form-select" id="monthGan">
                  <option value="">선택</option>
                  <option value="갑">갑(甲)</option><option value="을">을(乙)</option><option value="병">병(丙)</option><option value="정">정(丁)</option><option value="무">무(戊)</option><option value="기">기(己)</option><option value="경">경(庚)</option><option value="신">신(辛)</option><option value="임">임(壬)</option><option value="계">계(癸)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">월주 지지</label>
                <select class="form-select" id="monthJi">
                  <option value="">선택</option>
                  <option value="자">자(子)</option><option value="축">축(丑)</option><option value="인">인(寅)</option><option value="묘">묘(卯)</option><option value="진">진(辰)</option><option value="사">사(巳)</option><option value="오">오(午)</option><option value="미">미(未)</option><option value="신">신(申)</option><option value="유">유(酉)</option><option value="술">술(戌)</option><option value="해">해(亥)</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">일주 천간</label>
                <select class="form-select" id="dayGan">
                  <option value="">선택</option>
                  <option value="갑">갑(甲)</option><option value="을">을(乙)</option><option value="병">병(丙)</option><option value="정">정(丁)</option><option value="무">무(戊)</option><option value="기">기(己)</option><option value="경">경(庚)</option><option value="신">신(辛)</option><option value="임">임(壬)</option><option value="계">계(癸)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">일주 지지</label>
                <select class="form-select" id="dayJi">
                  <option value="">선택</option>
                  <option value="자">자(子)</option><option value="축">축(丑)</option><option value="인">인(寅)</option><option value="묘">묘(卯)</option><option value="진">진(辰)</option><option value="사">사(巳)</option><option value="오">오(午)</option><option value="미">미(未)</option><option value="신">신(申)</option><option value="유">유(酉)</option><option value="술">술(戌)</option><option value="해">해(亥)</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">시주 천간</label>
                <select class="form-select" id="hourGan">
                  <option value="">선택</option>
                  <option value="갑">갑(甲)</option><option value="을">을(乙)</option><option value="병">병(丙)</option><option value="정">정(丁)</option><option value="무">무(戊)</option><option value="기">기(己)</option><option value="경">경(庚)</option><option value="신">신(辛)</option><option value="임">임(壬)</option><option value="계">계(癸)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">시주 지지</label>
                <select class="form-select" id="hourJi">
                  <option value="">선택</option>
                  <option value="자">자(子)</option><option value="축">축(丑)</option><option value="인">인(寅)</option><option value="묘">묘(卯)</option><option value="진">진(辰)</option><option value="사">사(巳)</option><option value="오">오(午)</option><option value="미">미(未)</option><option value="신">신(申)</option><option value="유">유(酉)</option><option value="술">술(戌)</option><option value="해">해(亥)</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">
          ✦ 포국 시작
        </button>

      </form>
    </div>

    <p style="text-align:center; font-size: 11px; color: var(--text-dim); padding-bottom: 32px;">
      입력하신 정보는 Firebase에 안전하게 저장되며, 운세 분석에만 사용됩니다.
    </p>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- 음양력 변환 DB (1930~2050) -->
  <script src="js/lunar_calendar.js"></script>

  <!-- 만세력 DB (정확한 일주·연주·절기 계산) -->
  <script src="js/manse-db.js"></script>
  <script src="data/solar_terms_db.js"></script>

  <!-- 데이터 + 엔진 -->
  <script src="js/data-jeolgi.js"></script>
  <script src="js/data-ganji.js"></script>
  <script src="js/data-gugung.js"></script>
  <script src="js/data-yukhin.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/firebase.js"></script>

  <script>
    document.getElementById("sajuForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      // 시지 → 대표 시간(hour) 변환
      const sijiToHour = {
        자:23, 축:1, 인:3, 묘:5, 진:7, 사:9,
        오:11, 미:13, 신:15, 유:17, 술:19, 해:21
      };
      const sijiVal = document.getElementById("birthSiji").value;

      const input = {
        year:     parseInt(document.getElementById("birthYear").value),
        month:    parseInt(document.getElementById("birthMonth").value),
        day:      parseInt(document.getElementById("birthDay").value),
        hour:     sijiVal ? sijiToHour[sijiVal] : 12,
        siji:     sijiVal || "",
        calType:  document.getElementById("calType").value,
        gender:   document.getElementById("gender").value,
        yearGan:  document.getElementById("yearGan").value,
        yearJi:   document.getElementById("yearJi").value,
        monthGan: document.getElementById("monthGan").value,
        monthJi:  document.getElementById("monthJi").value,
        dayGan:   document.getElementById("dayGan").value,
        dayJi:    document.getElementById("dayJi").value,
        hourGan:  document.getElementById("hourGan").value,
        hourJi:   document.getElementById("hourJi").value || sijiVal,
      };

      // 연산 실행
      const result = runHongyeon(input);

      // 결과와 입력값 세션스토리지에 저장 (result.html에서 사용)
      sessionStorage.setItem("hongyeon_input",  JSON.stringify(input));
      sessionStorage.setItem("hongyeon_result", JSON.stringify(result));

      // Firebase에 사주 저장
      await saveSaju(input);

      // 결과 페이지로 이동
      window.location.href = "result.html";
    });
  </script>

  <script>
    function setCalType(type) {
      document.getElementById("calType").value = type;
      document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));

      if (type === "solar") {
        document.getElementById("btnSolar").classList.add("active");
        document.getElementById("btnLeap").style.display = "none";
      } else if (type === "lunar") {
        document.getElementById("btnLunar").classList.add("active");
        document.getElementById("btnLeap").style.display = "";
      } else {
        document.getElementById("btnLeap").classList.add("active");
        document.getElementById("btnLeap").style.display = "";
      }
    }
  </script>
</body>
</html>
