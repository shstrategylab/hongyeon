<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍연 마스터 — 홍연기문 운세</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <span class="logo">洪烟 마스터</span>
    <span class="logo-sub">홍연기문 · 홍국기문 운세 분석</span>
  </header>

  <main class="container">

    <nav class="nav-bar">
      <a href="index.html"   class="nav-item active">포국 입력</a>
      <a href="result.html"  class="nav-item">구궁도 결과</a>
      <a href="premium.html" class="nav-item">심층 풀이</a>
      <a href="prompt.html"  class="nav-item">AI 프롬프트</a>
    </nav>

    <div class="card">
      <div class="card-title">생년월일시 입력</div>

      <form id="sajuForm">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="birthYear">태어난 해</label>
            <input class="form-input" type="number" id="birthYear"
              placeholder="예: 1990" min="1900" max="2025" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="birthMonth">월</label>
            <select class="form-select" id="birthMonth" required>
              <option value="">월 선택</option>
              <option value="1">1월</option><option value="2">2월</option>
              <option value="3">3월</option><option value="4">4월</option>
              <option value="5">5월</option><option value="6">6월</option>
              <option value="7">7월</option><option value="8">8월</option>
              <option value="9">9월</option><option value="10">10월</option>
              <option value="11">11월</option><option value="12">12월</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="birthDay">일</label>
            <input class="form-input" type="number" id="birthDay"
              placeholder="예: 15" min="1" max="31" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="birthHour">시간 (0~23시)</label>
            <input class="form-input" type="number" id="birthHour"
              placeholder="예: 14" min="0" max="23" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="gender">성별</label>
          <select class="form-select" id="gender">
            <option value="남">남성</option>
            <option value="여">여성</option>
          </select>
        </div>

        <!-- 사주팔자 직접 입력 (선택) -->
        <details style="margin-top: 8px; margin-bottom: 16px;">
          <summary style="font-size: 12px; color: var(--text-muted); cursor: pointer; padding: 8px 0;">
            사주팔자(간지) 직접 입력 — 선택사항
          </summary>
          <div style="margin-top: 12px;">
            <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 12px;">
              만세력으로 확인한 정확한 간지를 입력하면 더 정밀한 포국이 가능합니다.
            </p>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">연주 천간</label>
                <select class="form-select" id="yearGan">
                  <option value="">선택</option>
                  <option>갑</option><option>을</option><option>병</option><option>정</option>
                  <option>무</option><option>기</option><option>경</option><option>신</option>
                  <option>임</option><option>계</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">연주 지지</label>
                <select class="form-select" id="yearJi">
                  <option value="">선택</option>
                  <option>자</option><option>축</option><option>인</option><option>묘</option>
                  <option>진</option><option>사</option><option>오</option><option>미</option>
                  <option>신</option><option>유</option><option>술</option><option>해</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">월주 천간</label>
                <select class="form-select" id="monthGan">
                  <option value="">선택</option>
                  <option>갑</option><option>을</option><option>병</option><option>정</option>
                  <option>무</option><option>기</option><option>경</option><option>신</option>
                  <option>임</option><option>계</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">월주 지지</label>
                <select class="form-select" id="monthJi">
                  <option value="">선택</option>
                  <option>자</option><option>축</option><option>인</option><option>묘</option>
                  <option>진</option><option>사</option><option>오</option><option>미</option>
                  <option>신</option><option>유</option><option>술</option><option>해</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">일주 천간</label>
                <select class="form-select" id="dayGan">
                  <option value="">선택</option>
                  <option>갑</option><option>을</option><option>병</option><option>정</option>
                  <option>무</option><option>기</option><option>경</option><option>신</option>
                  <option>임</option><option>계</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">일주 지지</label>
                <select class="form-select" id="dayJi">
                  <option value="">선택</option>
                  <option>자</option><option>축</option><option>인</option><option>묘</option>
                  <option>진</option><option>사</option><option>오</option><option>미</option>
                  <option>신</option><option>유</option><option>술</option><option>해</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">시주 천간</label>
                <select class="form-select" id="hourGan">
                  <option value="">선택</option>
                  <option>갑</option><option>을</option><option>병</option><option>정</option>
                  <option>무</option><option>기</option><option>경</option><option>신</option>
                  <option>임</option><option>계</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">시주 지지</label>
                <select class="form-select" id="hourJi">
                  <option value="">선택</option>
                  <option>자</option><option>축</option><option>인</option><option>묘</option>
                  <option>진</option><option>사</option><option>오</option><option>미</option>
                  <option>신</option><option>유</option><option>술</option><option>해</option>
                </select>
              </div>
            </div>
          </div>
        </details>

        <button type="submit" class="btn btn-primary">
          ✦ 포국 시작
        </button>

      </form>
    </div>

    <p style="text-align:center; font-size: 11px; color: var(--text-dim); padding-bottom: 32px;">
      입력하신 정보는 Firebase에 안전하게 저장되며, 운세 분석에만 사용됩니다.
    </p>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- 데이터 + 엔진 -->
  <script src="js/data-jeolgi.js"></script>
  <script src="js/data-ganji.js"></script>
  <script src="js/data-gugung.js"></script>
  <script src="js/data-yukhin.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/firebase.js"></script>

  <script>
    document.getElementById("sajuForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const input = {
        year:     parseInt(document.getElementById("birthYear").value),
        month:    parseInt(document.getElementById("birthMonth").value),
        day:      parseInt(document.getElementById("birthDay").value),
        hour:     parseInt(document.getElementById("birthHour").value),
        gender:   document.getElementById("gender").value,
        yearGan:  document.getElementById("yearGan").value,
        yearJi:   document.getElementById("yearJi").value,
        monthGan: document.getElementById("monthGan").value,
        monthJi:  document.getElementById("monthJi").value,
        dayGan:   document.getElementById("dayGan").value,
        dayJi:    document.getElementById("dayJi").value,
        hourGan:  document.getElementById("hourGan").value,
        hourJi:   document.getElementById("hourJi").value,
      };

      // 연산 실행
      const result = runHongyeon(input);

      // 결과와 입력값 세션스토리지에 저장 (result.html에서 사용)
      sessionStorage.setItem("hongyeon_input",  JSON.stringify(input));
      sessionStorage.setItem("hongyeon_result", JSON.stringify(result));

      // Firebase에 사주 저장
      await saveSaju(input);

      // 결과 페이지로 이동
      window.location.href = "result.html";
    });
  </script>

</body>
</html>
